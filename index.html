<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>譽富國際報價單 (V2.1 完整轉單版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1280px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        /* 標題與連線狀態 */
        h2 { border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; color: var(--primary); display: flex; justify-content: space-between; align-items: center; min-height: 40px; }
        .sync-badge { font-size: 12px; background: #eee; padding: 4px 10px; border-radius: 20px; color: #666; display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .dot.ok { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .dot.err { background: #ef4444; }
        .dot.loading { background: #eab308; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* 表單樣式 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 5px; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        /* V1.9 聯絡人標籤樣式 */
        .contact-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; min-height: 25px; }
        .c-tag { background: #dbeafe; color: #1e40af; padding: 2px 10px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; gap: 8px; border: 1px solid #bfdbfe; }
        .c-tag span { cursor: pointer; font-weight: bold; color: #ef4444; font-size: 14px; }
        .c-tag span:hover { color: #b91c1c; }

        /* 按鈕 */
        .btn { padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; margin-right: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #475569; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 列表與篩選 */
        .filter-bar { background: #e0f2fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; border: 1px solid #bae6fd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th { text-align: left; background: #e2e8f0; padding: 10px; cursor: pointer; user-select: none; }
        th:hover { background: #cbd5e1; }
        td { border-bottom: 1px solid #e2e8f0; padding: 10px; }
        tr:hover { background: #f8fafc; }
        .sort-icon { font-size: 10px; margin-left: 5px; color: #666; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; color: white; font-weight: bold; }
        .bg-green { background: #10b981; }
        .bg-gray { background: #94a3b8; }

        /* 報價明細 */
        .item-grid-layout { display: grid; grid-template-columns: 2fr 1fr 0.5fr 0.5fr 0.5fr 0.4fr 0.5fr 0.8fr 0.8fr 0.3fr; gap: 5px; align-items: center; }
        .item-header { 
            background: #64748b; color: white; padding: 8px 5px; 
            border-radius: 6px 6px 0 0; font-size: 13px; font-weight: bold; text-align: center;
            margin-bottom: 5px;
        }
        .item-header div { text-align: center; }
        .item-header div:nth-child(1), .item-header div:nth-child(2) { text-align: left; padding-left: 5px; }
        .item-row { margin-bottom: 5px; }
        .total-section { text-align: right; font-size: 18px; font-weight: bold; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; }

        /* 預覽與列印 */
        #previewOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 9998; }
        #previewModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9999; background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.3); border-radius: 8px; max-height: 90vh; overflow-y: auto; padding: 20px; border: 1px solid #ccc; }

        /* A4 列印樣式 */
        #printArea { display: none; width: 210mm; min-height: 297mm; padding: 15mm; background: white; color: black; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; position: relative; }
        .print-header { text-align: center; margin-bottom: 20px; border-bottom: 3px double #000; padding-bottom: 15px; }
        .company-title { font-size: 26px; font-weight: bold; letter-spacing: 3px; margin-bottom: 5px; }
        .company-info { font-size: 13px; line-height: 1.5; }
        .quote-info-grid { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; }
        .info-row { margin-bottom: 5px; display: flex; }
        .info-label { font-weight: bold; width: 80px; }
        .print-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        .print-table th { background: #f0f0f0; border: 1px solid #000; padding: 6px; text-align: center; }
        .print-table td { border: 1px solid #000; padding: 6px; }
        
        .signature-section { display: flex; justify-content: space-between; margin-top: 40px; }
        .sign-box { 
            width: 45%; border-bottom: 1px solid #000; padding-bottom: 10px; 
            position: relative; min-height: 120px; 
            display: flex; flex-direction: column; justify-content: flex-start;
            cursor: pointer; transition: background 0.2s;
        }
        .sign-box:hover { background: rgba(0,0,0,0.02); }
        .sign-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; z-index: 20; position: relative; }
        .sign-placeholder { color: #ccc; text-align: center; margin-top: auto; margin-bottom: 10px; pointer-events: none; }
        
        .stamp-img { 
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%) rotate(-3deg); 
            width: 140px; opacity: 0.95; z-index: 10;
            mix-blend-mode: multiply;
        }
        .stamp-alt-text {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px; color: #999; text-align: center;
            border: 1px dashed #ccc; padding: 5px; width: 80%;
        }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; border: none; }
            .no-print { display: none !important; }
            .sign-box:hover { background: none; }
            .stamp-alt-text { display: none !important; }
        }
    </style>
</head>
<body>

<div id="previewOverlay" onclick="closePreview()"></div>
<div id="previewModal"></div>
<div id="printArea"></div>

<input type="file" id="stampLoader" hidden accept="image/*" onchange="loadStampManual(this)">

<div class="container no-print">
    <h2>
        <span>譽富國際 (V2.1 完整轉單版)</span>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="sync-badge"><div id="cloudDot" class="dot loading"></div><span id="cloudText">啟動中...</span></div>
           <button class="btn btn-outline" onclick="exportData()">📥 備份JSON</button>
<input type="file" id="importFile" style="display:none" onchange="importData(this)">
<button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📤 還原JSON</button>

<button class="btn btn-outline" onclick="syncCloudData()">🔄 強制整理</button>
        </div>
    </h2>

    <details>
        <summary style="cursor:pointer; font-weight:bold; color:var(--primary); margin-bottom:15px; padding:10px; background:#f0f9ff; border-radius:6px;">➕ 新增/編輯 報價單 (點擊展開)</summary>
        <form id="quoteForm" onsubmit="event.preventDefault(); saveQuote();" style="border:1px solid #e2e8f0; padding:20px; border-radius:8px;">
            <input type="hidden" id="q_id">
            
            <div class="form-grid">
                <div class="form-group"><label>日期</label><input type="date" id="q_date" required></div>
                <div class="form-group"><label>有效期限</label><input type="date" id="q_valid"></div>
                <div class="form-group"><label>專案名稱</label><input type="text" id="q_proj" required placeholder="例如：招牌製作"></div>
                
                <div class="form-group">
                    <label>客戶名稱 (搜尋/同步)</label>
                    <input type="text" id="q_cust" list="cloudCustList" placeholder="輸入自動帶出地址與聯絡人..." onchange="autoFillCust(this.value)" required>
                </div>
                
                <div class="form-group" style="grid-column: span 2;">
                    <label>聯絡人 (人名+電話 多選)</label>
                    <div id="contactTags" class="contact-tags"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 40px; gap:5px;">
                        <input type="text" id="q_contact_name" list="custContactList" placeholder="聯絡人 (選取後自動帶入電話)" oninput="autoFillContactPhone(this.value)">
                        <input type="text" id="q_contact_phone" placeholder="電話 (可手動修改)">
                        <button type="button" class="btn btn-success btn-sm" onclick="addContactTag()">+</button>
                    </div>
                </div>

                <div class="form-group"><label>公司電話</label><input type="text" id="q_phone" placeholder="公司總機"></div>
                <div class="form-group"><label>統編</label><input type="text" id="q_tax_id"></div>
                <div class="form-group" style="grid-column: span 2;"><label>地址 (可回存)</label><input type="text" id="q_address" placeholder="客戶地址"></div>
            </div>

            <div style="background:#f8fafc; padding:10px; border-radius:6px; border:1px solid #e2e8f0; margin-bottom:15px;">
                <label style="color:var(--primary); margin-bottom:10px; display:block;">報價明細</label>
                <div class="item-grid-layout item-header">
                    <div>項目</div><div>規格</div><div>長(cm)</div><div>寬(cm)</div><div>單位</div>
                    <div>才數</div><div>數量</div><div>單價</div><div>金額</div><div></div>
                </div>
                <div id="itemContainer"></div>
                <button type="button" class="btn btn-success btn-sm" style="margin-top:10px;" onclick="addItem()">+ 增加項目</button>
                <div class="total-section">
                    未稅: <span id="display_sub">$0</span> | 稅金(5%): <span id="display_tax">$0</span> | 總計: <span id="display_total">$0</span>
                </div>
            </div>

            <div class="form-group"><label>備註條款</label><textarea id="q_note" rows="15"></textarea></div>

            <div style="margin-top:20px;">
                <button class="btn btn-primary">💾 儲存 (同步至雲端)</button>
                <button type="button" class="btn btn-outline" onclick="resetForm()">🔄 清空</button>
            </div>
        </form>
    </details>

    <hr style="margin: 25px 0;">

    <div class="filter-bar">
        <div class="form-group"><label>日期起</label><input type="date" id="filter_start" onchange="renderList()"></div>
        <div class="form-group"><label>日期迄</label><input type="date" id="filter_end" onchange="renderList()"></div>
        <div class="form-group"><label>狀態</label>
            <select id="filter_status" onchange="renderList()">
                <option value="all">全部</option>
                <option value="converted">✅ 已轉訂單</option>
                <option value="unconverted">⬜ 未轉訂單</option>
            </select>
        </div>
        <div class="form-group" style="flex:1;">
            <label>搜尋</label><input type="text" id="searchInput" placeholder="搜尋專案、客戶..." oninput="renderList()">
        </div>
    </div>

    <table id="listTable">
        <thead>
            <tr>
                <th onclick="sortList('id')" style="width:90px;">單號(預覽) <span id="sort_id" class="sort-icon">▼</span></th>
                <th onclick="sortList('date')">日期 <span id="sort_date" class="sort-icon"></span></th>
                <th onclick="sortList('cust')">客戶 <span id="sort_cust" class="sort-icon"></span></th>
                <th onclick="sortList('proj')">專案 <span id="sort_proj" class="sort-icon"></span></th>
                <th onclick="sortList('total')">總額 <span id="sort_total" class="sort-icon"></span></th>
                <th onclick="sortList('converted')">狀態 <span id="sort_converted" class="sort-icon"></span></th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="quoteListBody"></tbody>
    </table>
</div>

<datalist id="cloudCustList"></datalist>
<datalist id="custContactList"></datalist> 
<datalist id="prodList"></datalist>
<datalist id="unitList"><option value="式"><option value="組"><option value="件"><option value="個"><option value="才"><option value="樘"><option value="支"><option value="台"><option value="公分"></datalist>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxe2sRP07xV2y-Hmon3Z6Mocue8F1OXcdD5x-TiRsTq4PCNBNQa-ILl2kGKRLF4uqlZUg/exec';
    const DEFAULT_PRODUCTS = ["PP亮","PP霧","PVC霧","PVC亮","全透亮","全透霧","半透亮","半透霧","雙透布","單透布","油畫布","斜紋布","合成板","強光板","發泡板","中空板","無接縫","壓克力","立體發光字","霓虹燈字","招牌燈箱","壓克力燈箱"];
    const DEFAULT_NOTE = `以上報價為不含美編 (請自備完整可印刷美工電子檔)【檔案請自行做好再發印，恕本公司無法協助修改】
★本報價單經雙方確認簽章後,即可視為正式訂單.具有法律效力，本公司報價人員如有報價錯誤，本公司得以保留接單與否之權利。
★下單前. 請詳閱本公司官網的"注意事項"
輸出注意事項可連結 http://www.yufudesign.com.tw/?urlid=webpage&sn=12
★合版印刷. 每次進紙. 厚度多少有些誤差..若無法接受 另外估價
★大圖輸出時, 本公司尺寸僅多1cm預留誤差, 若現場施工發現尺寸不足, 費用需自行負擔。
★施工現場驗收時,請由權責主管或委任設計師,其一方到場驗收,如當天未能驗收完畢,
須另外酌收車馬費$1700元整。
★檔案如非方形，需要額外割型，請於檔案內畫好割型的刀模框線，否則檔案將無法印製。
★本報價為7天內有效(含例假日)
★ ★付款後製作★ ★（匯款產生之任何手續費需由客戶端自行擔付）
轉帳資料~
第一銀行 埔墘分行 (007)
戶名：譽富國際有限公司
帳號：238-100-65601
*如蒙惠顧，請於下方確認簽名蓋章，mail或LINE回覆，謝謝`;
    
    const COMPANY_INFO = { title: "譽富國際有限公司", details: "統一編號：54036027 | 電話：(02) 2959-9137" };

    let db = { quotes: [], products: [...DEFAULT_PRODUCTS] }; 
    let cloudDB = {}; 
    let sortState = { field: 'id', dir: 'desc' };
    let stampData = '民生公司發票章1.png';
    let currentQuoteContacts = []; 

    // === V2.0 純雲端初始化 ===
    window.onload = function() {
        // 不讀取 localStorage 的報價單資料，強制清空等待雲端
        db = { quotes: [], products: [...DEFAULT_PRODUCTS] }; 

        document.getElementById('filter_start').value = '';
        document.getElementById('filter_end').value = '';
        
        // 設定 UI 狀態：載入中
        const listBody = document.getElementById('quoteListBody');
        listBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px; color:#666;">☁️ 正在從雲端資料庫下載資料，請稍候...<br>(速度取決於網路狀況，約需1~3秒)</td></tr>';

        updateProdList();
        resetForm();

        // 嘗試讀取印章圖片 (這是設定，非資料，可讀本地)
        try {
            const savedStamp = localStorage.getItem('erp_stamp_img');
            if(savedStamp) stampData = savedStamp;
        } catch(e) {}
        
        // 立即執行雲端同步
        syncCloudData(); 
    };

    function saveToLocal() { 
        // V2.0 備用：還是存一下本地當作快取，但主要依賴雲端
        try { localStorage.setItem('erp_quote_v17', JSON.stringify(db)); } catch(e) {}
    }

    function loadStampManual(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                stampData = e.target.result;
                localStorage.setItem('erp_stamp_img', stampData);
                document.querySelectorAll('.stamp-img').forEach(img => { img.src = stampData; img.style.display = 'block'; img.nextElementSibling.style.display = 'none'; });
                alert('✅ 印章載入成功！');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ================= V1.9 聯絡人與電話邏輯 =================
    function autoFillCust(name) {
        if(!cloudDB.p) return;
        const c = cloudDB.p.find(x => x.name === name);
        if (c) {
            document.getElementById('q_phone').value = c.phone || '';
            document.getElementById('q_tax_id').value = c.tax || '';
            document.getElementById('q_address').value = c.address || '';
            
            const list = document.getElementById('custContactList');
            list.innerHTML = '';
            if(c.contacts && Array.isArray(c.contacts)) {
                c.contacts.forEach(ct => { 
                    if(ct.n) {
                        const opt = document.createElement('option');
                        opt.value = ct.n;
                        list.appendChild(opt);
                    }
                });
            }
        }
    }

    function autoFillContactPhone(name) {
        const custName = document.getElementById('q_cust').value;
        const c = cloudDB.p ? cloudDB.p.find(x => x.name === custName) : null;
        const phoneInput = document.getElementById('q_contact_phone');
        if (c && c.contacts) {
            const target = c.contacts.find(ct => ct.n === name);
            if (target && target.p) phoneInput.value = target.p;
        }
    }

    function addContactTag() {
        const nameInput = document.getElementById('q_contact_name');
        const phoneInput = document.getElementById('q_contact_phone');
        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        if(!name) return;
        if(currentQuoteContacts.some(c => c.n === name && c.p === phone)) { alert('此聯絡人(含電話)已加入'); return; }
        currentQuoteContacts.push({ n: name, p: phone });
        renderContactTags();
        nameInput.value = ''; phoneInput.value = '';
    }

    function removeContactTag(idx) {
        currentQuoteContacts.splice(idx, 1);
        renderContactTags();
    }

    function renderContactTags() {
        const div = document.getElementById('contactTags');
        div.innerHTML = currentQuoteContacts.map((c, idx) => 
            `<div class="c-tag">${c.n}${c.p ? ' ('+c.p+')' : ''} <span onclick="removeContactTag(${idx})">×</span></div>`
        ).join('');
    }

    // ================= V2.0 純雲端同步核心 =================
    async function syncCloudData() {
        const dot = document.getElementById('cloudDot');
        const text = document.getElementById('cloudText');
        dot.className = 'dot loading';
        text.innerText = '下載雲端資料中...';
        
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            if(data) {
                cloudDB = data; 
                // 強制使用雲端資料覆蓋本地
                if(cloudDB.q && Array.isArray(cloudDB.q)) {
                    db.quotes = cloudDB.q;
                } else {
                    db.quotes = [];
                }

                if(!cloudDB.p) cloudDB.p = [];
                if(!cloudDB.o) cloudDB.o = [];

                // 排序
                db.quotes.sort((a, b) => b.id - a.id);
                
                // 更新畫面
                renderList();
                updateCustList();

                dot.className = 'dot ok';
                text.innerText = `同步完成 (共 ${db.quotes.length} 筆)`;
                console.log("雲端資料同步成功");
                saveToLocal(); // 順便存一份快取
            }
        } catch(e) { 
            console.error(e); 
            dot.className = 'dot err'; 
            text.innerText = '連線失敗'; 
            if(document.getElementById('quoteListBody').innerText.includes('Loading')) {
                document.getElementById('quoteListBody').innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">❌ 無法連線至 Google 資料庫，請檢查網路。</td></tr>';
            }
        }
    }

    // 修改後的 pushToCloud 函式 (第 248-267 行)
async function pushToCloud(quoteData) {
    const dot = document.getElementById('cloudDot');
    const text = document.getElementById('cloudText');
    text.innerText = '正在同步單筆...';
    dot.className = 'dot loading';
    
    try {
        const payload = {
            action: 'save_quote',
            data: quoteData,      // 僅傳送這一張報價單
            custData: cloudDB.p   // 視需求同步更新後的客戶名單

        dot.className = 'dot err';

    function updateProdList() { document.getElementById('prodList').innerHTML = db.products.map(p => `<option value="${p}">`).join(''); }

    // ================= 核心邏輯 =================
    async function saveQuote() {
        const dot = document.getElementById('cloudDot');
        // 簡單鎖定防止重複按
        if(dot.className.includes('loading')) { alert('正在同步中，請稍候...'); return; }

        const id = document.getElementById('q_id').value;
        const custName = document.getElementById('q_cust').value;
        const phone = document.getElementById('q_phone').value;
        const taxId = document.getElementById('q_tax_id').value;
        const address = document.getElementById('q_address').value;
        
        const pendingName = document.getElementById('q_contact_name').value.trim();
        const pendingPhone = document.getElementById('q_contact_phone').value.trim();
        if(pendingName && !currentQuoteContacts.some(c => c.n === pendingName && c.p === pendingPhone)) {
            currentQuoteContacts.push({ n: pendingName, p: pendingPhone });
        }
        
        const contactStr = currentQuoteContacts.map(c => c.n + (c.p ? '('+c.p+')' : '')).join('、');

        if(!custName) return alert('請輸入客戶名稱');

        document.querySelectorAll('.i-desc').forEach(input => {
            const val = input.value.trim();
            if(val && !db.products.includes(val)) db.products.push(val);
        });
        updateProdList();

        if(!cloudDB.p) cloudDB.p = [];
        let p = cloudDB.p.find(x => x.name === custName);
        
        if (!p) {
            const newContacts = currentQuoteContacts.map(c => ({ n: c.n, p: c.p || '', l: '' }));
            cloudDB.p.push({ 
                id: Date.now(), name: custName, type: 'c', 
                phone: phone, tax: taxId, address: address, 
                contact: contactStr, 
                contacts: newContacts 
            });
        } else {
            p.phone = phone; p.tax = taxId; p.address = address; p.contact = contactStr;
            if(!p.contacts) p.contacts = [];
            currentQuoteContacts.forEach(newC => {
                const existing = p.contacts.find(pc => pc.n === newC.n);
                if (existing) { if (newC.p) existing.p = newC.p; } 
                else { p.contacts.push({ n: newC.n, p: newC.p || '', l: '' }); }
            });
        }

        let items=[]; 
        document.querySelectorAll('.item-row').forEach(r=>{ 
            items.push({ 
                desc: r.querySelector('.i-desc').value, 
                spec: r.querySelector('.i-spec').value,
                w: r.querySelector('.i-w').value, h: r.querySelector('.i-h').value, 
                unit: r.querySelector('.i-unit').value, 
                tal: r.querySelector('.i-tal').value, qty: r.querySelector('.i-qty').value, 
                price: r.querySelector('.i-price').value, amt: parseFloat(r.querySelector('.i-amt').value)||0 
            }); 
        });
        
        const {sub, tax, total} = calcTotal();
        const q = { 
            id: id?parseInt(id):Date.now(), 
            date: document.getElementById('q_date').value, 
            valid: document.getElementById('q_valid').value, 
            proj: document.getElementById('q_proj').value, 
            cust: custName, phone, taxId, contact: contactStr, address, 
            items, subtotal: sub, tax, total, 
            note: document.getElementById('q_note').value,
            converted: false 
        };
        
        if(id) { 
            const idx=db.quotes.findIndex(x=>x.id==id); 
            if(idx!==-1) { q.converted = db.quotes[idx].converted; db.quotes[idx]=q; }
        } else {
            db.quotes.unshift(q);
        }
        
        saveToLocal();
        
        // V2.0 重點：儲存後立即強制上傳
        await pushToCloud(q);
        
        document.getElementById('filter_start').value = '';
        document.getElementById('filter_end').value = '';
        document.getElementById('searchInput').value = '';
        document.getElementById('filter_status').value = 'all';
        renderList(); 
        resetForm();

        alert('✅ 儲存並同步雲端成功！');
    }

async function convertToOrder(quoteId) {
        const q = db.quotes.find(x => x.id === quoteId);
        if(!q) return;
        if(q.converted && !confirm('此報價單已轉過訂單，要再次轉單嗎？')) return;
        if(!confirm(`確定將 #${q.id} 轉為正式訂單？`)) return;

        const newOrder = {
            id: Date.now(), date: q.date, proj: q.proj, cust: q.cust,
            contact: q.contact, phone: q.phone, address: q.address,
            invoice: '無', invNum: '', price: q.total, base: q.subtotal, tax: q.tax,
            deposit: 0, pay: '未收款', bank: '', 
            note: `[由報價單 #${q.id} 轉入] ${q.note}`, 
            items: q.items ? q.items.map(i => {
                let finalName = i.desc || '';
                if (i.spec) finalName = finalName ? `${finalName} (${i.spec})` : i.spec;
                return { name: finalName, spec: i.spec, w: i.w, h: i.h, unit: i.unit, qty: i.qty, price: i.price, amt: i.amt };
            }) : [],
            subs: [] 
        };

        // 更新本地快取 (雖非必要但可保持一致性)
        if(!cloudDB.o) cloudDB.o = [];
        cloudDB.o.unshift(newOrder);
        q.converted = true;
        saveToLocal();

        // ★★★ 修正區塊開始 ★★★
        const dot = document.getElementById('cloudDot');
        const text = document.getElementById('cloudText');
        if(text) text.innerText = '正在轉存訂單...';
        if(dot) dot.className = 'dot loading';

        try {
            // 1. 發送訂單給 ERP (使用 save_erp 指令)
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'save_erp',
                    orders: [newOrder] // 將新訂單包成陣列傳送
                })
            });

            // 2. 更新報價單狀態 (記得要把 q 傳進去！)
            await pushToCloud(q);

            alert('✅ 轉單成功！');
        } catch(e) {
            console.error(e);
            alert('❌ 轉單失敗，請檢查網路');
            if(dot) dot.className = 'dot err';
            if(text) text.innerText = '轉單失敗';
        }
        // ★★★ 修正區塊結束 ★★★

        renderList();
    }
    // ★★★ 修正後的報價單刪除 (配合多人防衝突版) ★★★
    async function delQuote(id) { 
        if(!confirm('確定要永久刪除此報價單嗎？(將從雲端移除)')) return;
        
        // 1. 本地先移除 (讓畫面先變，提升體驗)

        if(dot) dot.className = 'dot loading';

        try {

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // 確保跨域不擋
                body: JSON.stringify({
                    action: 'delete_item',
                    type: 'q',  // 'q' 代表刪除報價單
                    id: id
                })
            });
            
            if(dot) dot.className = 'dot ok';
            if(text) text.innerText = '刪除成功';

        }

    // ================= UI 操作 =================
    function addItem(desc='', spec='', w='', h='', qty=1, price=0, unit='式', amt=0) {
        const div = document.createElement('div'); div.className = 'item-grid-layout item-row';
        div.innerHTML = `
            <input type="text" class="i-desc" list="prodList" value="${desc}">
            <input type="text" class="i-spec" value="${spec}">
            <input type="number" class="i-w" value="${w}" oninput="calcRow(this)">
            <input type="number" class="i-h" value="${h}" oninput="calcRow(this)">
            <input type="text" class="i-unit" list="unitList" value="${unit}">
            <input type="text" class="i-tal" readonly style="background:#eee; text-align:center;">
            <input type="number" class="i-qty" value="${qty}" oninput="calcRow(this)">
            <input type="number" class="i-price" value="${price}" oninput="calcRow(this)">
            <input type="number" class="i-amt" value="${amt || 0}" onchange="calcTotal()">
            <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.remove(); calcTotal()">X</button>
        `;
        document.getElementById('itemContainer').appendChild(div); 
        if(w || h || price) calcRow(div.querySelector('.i-w'), amt > 0);
    }

    function calcRow(el, preserveAmt = false) {
        const row = el.closest('.item-row');
        const w = parseFloat(row.querySelector('.i-w').value)||0, h = parseFloat(row.querySelector('.i-h').value)||0;
        const qty = parseFloat(row.querySelector('.i-qty').value)||0, price = parseFloat(row.querySelector('.i-price').value)||0;
        
        let tal = 0;
        if(w>0 && h>0) {
            tal = Math.ceil((w*h)/900); if(tal<1) tal=1; 
            row.querySelector('.i-tal').value = tal;
        } else { row.querySelector('.i-tal').value = '-'; }
        
        if(!preserveAmt) {
            const multiplier = tal > 0 ? tal : 1;
            const sub = Math.round(price * multiplier * qty);
            row.querySelector('.i-amt').value = sub;
        }
        calcTotal();
    }

    function calcTotal() {
        let sub = 0; 
        document.querySelectorAll('.i-amt').forEach(el => sub += (parseFloat(el.value)||0));
        const tax = Math.round(sub * 0.05);
        document.getElementById('display_sub').innerText = '$'+sub.toLocaleString();
        document.getElementById('display_tax').innerText = '$'+tax.toLocaleString();
        document.getElementById('display_total').innerText = '$'+(sub+tax).toLocaleString();
        return { sub, tax, total: sub+tax };
    }

        document.getElementById('quoteForm').reset(); document.getElementById('q_id').value='';

    function renderList() {
        const key = document.getElementById('searchInput').value.toLowerCase();
        const start = document.getElementById('filter_start').value;
        const end = document.getElementById('filter_end').value;
        const status = document.getElementById('filter_status').value;

        let list = db.quotes.filter(q => {
            const inDate = (!start || q.date >= start) && (!end || q.date <= end);
            const inStatus = (status === 'all') || (status === 'converted' && q.converted) || (status === 'unconverted' && !q.converted);
            const inKey = (q.cust + q.proj + (q.id||'')).toLowerCase().includes(key);
            return inDate && inStatus && inKey;
        });

        list.sort((a, b) => {
            let valA = a[sortState.field], valB = b[sortState.field];
            if(sortState.field==='total'||sortState.field==='id') return sortState.dir==='asc'? valA-valB : valB-valA;
            return sortState.dir==='asc'? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
        });

        document.querySelectorAll('.sort-icon').forEach(el => el.innerText = '');
        document.getElementById('sort_' + sortState.field).innerText = sortState.dir === 'asc' ? '▲' : '▼';

        document.getElementById('quoteListBody').innerHTML = list.map(q => `
            <tr>
                <td style="color:var(--primary); font-weight:bold; cursor:pointer;" onmouseenter="previewQuote(${q.id})" title="預覽">#${q.id} 👁️</td>
                <td>${q.date}</td><td>${q.cust}</td><td>${q.proj}</td>
                <td>$${(q.total||0).toLocaleString()}</td>
                <td><span class="badge ${q.converted?'bg-green':'bg-gray'}">${q.converted?'已轉訂單':'未轉訂單'}</span></td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="copyQuote(${q.id})" title="複製">📋</button>
                    <button class="btn btn-sm btn-outline" onclick="editQuote(${q.id})" title="編輯">✏️</button>
                    <button class="btn btn-sm btn-primary" onclick="printQuote(${q.id}, 'pdf')">🖨️</button>
                    <button class="btn btn-sm btn-success" onclick="printQuote(${q.id}, 'jpg')">🖼️</button>
                    <button class="btn btn-sm btn-purple" onclick="convertToOrder(${q.id})">☁️</button>
                    <button class="btn btn-sm btn-danger" onclick="delQuote(${q.id})">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function sortList(field) {
        if (sortState.field === field) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
        else { sortState.field = field; sortState.dir = 'desc'; }
        renderList();
    }

// ★★★ 請補上這一段還原函式 ★★★
    async function importData(input) {
        const f = input.files[0];
        if(!f) return;
        
        const r = new FileReader();
        r.onload = async function(e) {
            try {
                let content = JSON.parse(e.target.result);

                // 自動修正：如果您是用這個報價單系統備份的，格式會是 quotes，要轉成 q 才能讓 ERP 讀懂
                if (content.quotes && !content.q) {
                     content.q = content.quotes;
                     delete content.quotes;
                }

                if(!confirm("⚠️ 嚴重警告：\n這將會「完全覆蓋」雲端上【所有系統】(包含 ERP、出貨、銀行) 的資料！\n\n請確認您上傳的是「完整備份檔」。\n\n確定要執行還原嗎？")) return;
                
                // 顯示讀取中
                const dot = document.getElementById('cloudDot');
                const text = document.getElementById('cloudText');
                if(dot) dot.className = 'dot loading';
                if(text) text.innerText = '正在執行全還原...';
                
                // 發送還原指令
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'FULL_RESTORE', allData: content })
                });
                
                alert('✅ 還原成功！網頁將重新整理。');
                location.reload();
            } catch(err) {
                alert('❌ 還原失敗，請檢查檔案格式。\n錯誤訊息：' + err);
                // 恢復狀態
                try {
                    document.getElementById('cloudDot').className = 'dot err';
                    document.getElementById('cloudText').innerText = '還原失敗';
                } catch(e){}
            }
        };
        r.readAsText(f);
        input.value = ''; // 清空以允許重複上傳
    }
</script>
</body>
</html>
